## EKF CONFIG FILE ###
ekf_local:
  ros__parameters:
    frequency: 30.0            # Hz, new estimate 30 times every second
    sensor_timeout: 0.1
    two_d_mode: true           # 2D PLANE
    publish_tf: true           # Broadcast to /tf topic

    map_frame: map             # Pos in overall env
    odom_frame: odom           # ODOM
    base_link_frame: base_footprint
    world_frame: odom


    # Odometry input (from vector_node)
    odom0: /odom

    # 
    odom0_config: [true, true, false,
                   false, false, true,
                   true, false, false,
                   false, false, true,
                   false, false, false]

  #               [x_pos   , y_pos    , z_pos,
  #                roll    , pitch    , yaw  ,
  #                x_vel   , y_vel    , z_vel,
  #                roll_vel, pitch_vel, yaw_vel,
  #                x_accel,  y_accel  , z_accel]

    # IMU input (from vector_node)
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]

# ODOM -> BASE_FOOTPRINT

