amcl:
  ros__parameters:
    use_sim_time: true

map_server:
  ros__parameters:
    yaml_filename: "package://vector_driver/maps/map.yaml"
    use_sim_time: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugin: "GridBased"
    use_sim_time: true

controller_server:
  ros__parameters:
    controller_plugins: ["FollowPath"]
    use_sim_time: true

bt_navigator:
  ros__parameters:
    default_bt_xml_filename: "package://nav2_bt_navigator/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_and_recovery.xml"
    use_sim_time: true

behavior_server:
  ros__parameters:
    use_sim_time: true

nav2_lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names: ["map_server",
                  "planner_server",
                  "controller_server",
                  "behavior_server",
                  "amcl"]
